<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<th:block th:fragment="setContent(content)">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <meta name="description" content="" />
        <meta name="author" content="" />
        <title>Shop Item - Start Bootstrap Template</title>

        <!-- Favicon-->
        <link rel="icon" type="image/x-icon" href="/item-detail/assets/favicon.ico" />
        <!-- Bootstrap icons-->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />
        <!-- Core theme CSS (includes Bootstrap)-->
        <link href="/item-detail/css/styles.css" rel="stylesheet" />

        <!-- Custom CSS for Pagination -->
        <style>
            .pagination .page-item.active .page-link {
                background-color: #000 !important;
                border-color: #000 !important;
                color: #fff !important;
            }
            .pagination .page-item.active .page-link:hover {
                background-color: #000 !important;
                border-color: #000 !important;
                color: #fff !important;
            }
            .navbar .btn-outline-dark {
                border-color: #000 !important;
                color: #000 !important;
            }
            .navbar .btn-outline-dark:hover {
                background-color: #000 !important;
                color: #fff !important;
            }
            .navbar .member-info {
                display: flex;
                align-items: center;
                gap: 8px;
            }
            .navbar .member-info span {
                margin-right: 10px;
                font-weight: bold;
                color: #000;
            }
            .navbar .member-info button {
                margin-left: 5px;
            }
        </style>
    </head>

    <body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container px-4 px-lg-5">
            <a class="navbar-brand" href="/demo/list">Start Bootstrap</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                    aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0 ms-lg-4">
                    <li class="nav-item"><a class="nav-link active" aria-current="page" href="/demo/list">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="#!">About</a></li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" id="navbarDropdown" href="#" role="button"
                           data-bs-toggle="dropdown" aria-expanded="false">Shop</a>
                        <ul class="dropdown-menu" aria-labelledby="navbarDropdown">
                            <li><a class="dropdown-item" href="#!">All Products</a></li>
                            <li><hr class="dropdown-divider" /></li>
                            <li><a class="dropdown-item" href="#!">Popular Items</a></li>
                            <li><a class="dropdown-item" href="#!">New Arrivals</a></li>
                        </ul>
                    </li>
                </ul>

                <div class="d-flex">

                    <!-- ✅ 로그인된 사용자 (member != null) -->
                    <div th:if="${member != null}" class="member-info">
                        <span th:text="'Hello, ' + ${member.nickname}"></span>
                        <form action="/demo/logout" method="post" style="margin:0;">
                            <button class="btn btn-outline-dark" type="submit">
                                <i class="bi-box-arrow-right me-1"></i>
                                Logout
                            </button>
                        </form>
                    </div>

                    <!-- ✅ 비로그인 사용자 (member == null) -->
                    <div th:if="${member == null}">
                        <a href="/demo/signin" style="text-decoration: none;">
                            <button class="btn btn-outline-dark" type="button">
                                <i class="bi-box-arrow-in-right me-1"></i>
                                Sign In
                            </button>
                        </a>
                    </div>

                    <!-- ✅ Cart 버튼: 비로그인 -> 로그인 페이지 -->
                    <a th:if="${member == null}" href="/demo/signin"
                       style="text-decoration: none; margin-left: 10px;">
                        <button class="btn btn-outline-dark" type="button">
                            <i class="bi-cart-fill me-1"></i>
                            Cart
                        </button>
                    </a>

                    <!-- ✅ Cart 버튼: 로그인 -> 카트 페이지 + cartCount 출력 -->
                    <a th:if="${member != null}" href="/demo/cart"
                       style="text-decoration: none; margin-left: 10px;">
                        <button class="btn btn-outline-dark" type="button">
                            <i class="bi-cart-fill me-1"></i>
                            Cart
                            <span id="cart-count" class="badge bg-dark text-white ms-1 rounded-pill"
                                  th:text="${cartCount != null ? cartCount : 0}">
                            </span>
                        </button>
                    </a>

                </div>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <th:block th:replace="${content}"></th:block>
    </div>

    <!-- (원래 코드에 jQuery가 없는데 $(document).ready가 있어서, 필요하면 jQuery 스크립트 추가해야 함) -->
    <script>
        // $(document).ready(function() {});
    </script>
    </body>
</th:block>
</html>
