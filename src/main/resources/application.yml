spring:
  application:
    name: payment
  # Database 설정
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/tpsm?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:tpsmuser}
    password: ${DB_PASSWORD}

  # JPA 설정
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update        # DB 초기화 전략 (none, create, create-drop, update, validate)
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true      # 쿼리 로그 포맷 (정렬)
        show_sql: true        # 쿼리 로그 출력
    mvc:
      view:
        prefix: "/WEB-INF/views"
  imp:
    code: ${IMP_CODE}
    api:
      key: ${IMP_API_KEY}
      secretkey: ${IMP_API_SECRET}
  server:
    servlet:
      session:
        tracking-modes: cookie
